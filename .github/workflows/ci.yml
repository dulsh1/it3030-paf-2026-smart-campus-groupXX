name: CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  backend:
    name: Backend - Build & Test (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build & test (skip if pom.xml not yet added)
        run: |
          if [ -f pom.xml ]; then
            mvn -B test
          else
            echo "No backend/pom.xml yet - skipping backend build."
          fi

  frontend:
    name: Frontend - Build (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build (skip if package.json not yet added)
        run: |
          if [ -f package.json ]; then
            npm ci
            npm run build
          else
            echo "No frontend/package.json yet - skipping frontend build."
          fi
